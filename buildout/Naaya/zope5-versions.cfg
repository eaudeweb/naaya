[buildout]
extends =
  https://zopefoundation.github.io/Zope/releases/5.13/versions-prod.cfg

index = https://pypi.python.org/simple
find-links =
  https://eggrepo.eea.europa.eu/simple

[versions]
# Buildout infrastructure
zc.buildout = 3.1.0
setuptools = 75.8.0
zc.recipe.egg = 2.0.7
plone.recipe.zope2instance = 8.0.1
plone.recipe.zeoserver = 3.0.5
plone.recipe.haproxy = 1.1.2

# Zope products distributed separately in Zope 5
Products.TemporaryFolder = 8.1
Products.Sessions = 5.0
Products.SiteErrorLog = 6.0
tempstorage = 6.0
