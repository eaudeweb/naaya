# gdata removed (deprecated, no Py3 support)
# BeautifulSoup removed (replaced by beautifulsoup4)
# pydns removed (replaced by dnspython)
# MySQL-python removed (replaced by mysqlclient)
# raven removed (replaced by sentry-sdk)
# Products.TextIndexNG3 removed (no Py3 support)
# zopyx.txng3.ext removed (no Py3 support)
# zopyx.txng3.core removed (no Py3 support)
# six removed (not needed for Py3-only code)
# enum34 removed (stdlib in Py3)
# plone.app.blob removed (integrated in ZODB 4+)
# zope.app.i18n removed (use zope.i18n)
# zope.app.interface removed (use zope.interface)
# zope.app.component removed (use zope.component)
