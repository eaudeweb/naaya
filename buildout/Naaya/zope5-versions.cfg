Products.ExternalMethod = 5.0
Products.MailHost = 5.2
Products.BTreeFolder2 = 5.0
Products.ZCatalog = 7.2
Products.ZCTextIndex = 5.0
Products.StandardCacheManagers = 5.0

# Data/Storage
ZODB = 6.0
ZEO = 6.0.1
zodbpickle = 4.1.1
persistent = 6.1
BTrees = 6.1

# Third party - Py3 compatible versions
